name: Daily Gold Price
on:
  schedule:
    - cron: "45 5 * * 0-4"
    - cron: "45 5 * * 5-6"
    - cron: "45 9 * * 0-4"
    - cron: "15 14 * * 0-4"
  workflow_dispatch:
    inputs:
      schedule:
        description: Time slot
        required: true
        default: morning
        type: choice
        options:
          - morning
          - afternoon
          - evening

jobs:
  morning:
    if: github.event_name == 'schedule' && (github.event.schedule == '45 5 * * 0-4' || github.event.schedule == '45 5 * * 5-6') || (github.event_name == 'workflow_dispatch' && inputs.schedule == 'morning')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python gold_price.py morning
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
      - run: |
          git config user.name "gold-bot"
          git config user.email "gold-bot@users.noreply.github.com"
          git add gold_history.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update gold history [morning]"
          git push

  afternoon:
    if: github.event_name == 'schedule' && github.event.schedule == '45 9 * * 0-4' || (github.event_name == 'workflow_dispatch' && inputs.schedule == 'afternoon')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python gold_price.py afternoon
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
      - run: |
          git config user.name "gold-bot"
          git config user.email "gold-bot@users.noreply.github.com"
          git add gold_history.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update gold history [afternoon]"
          git push

  evening:
    if: github.event_name == 'schedule' && github.event.schedule == '15 14 * * 0-4' || (github.event_name == 'workflow_dispatch' && inputs.schedule == 'evening')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python gold_price.py evening
        env:
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
      - run: |
          git config user.name "gold-bot"
          git config user.email "gold-bot@users.noreply.github.com"
          git add gold_history.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update gold history [evening]"
          git push
